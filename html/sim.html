<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Méthode du simplexe - Optimisation linéaire</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 30px;
    background-color: rgb(223, 223, 239);
  }
  textarea, input {
    width: 260px;
    margin-bottom: 10px;
  }
  button {
    padding: 10px 20px;
    cursor: pointer;
  }
  pre {
    background: #f4f4f4;
    padding: 15px;
    margin-top: 15px;
    font-size: 15px;
  }
  .error {
    color: red;
    font-weight: bold;
  }
</style>
</head>

<body>

<h1>Résolution par la méthode du simplexe</h1>

<p>
✔ Maximisation<br>
✔ Contraintes de type ≤<br>
✔ Variables ≥ 0
</p>

<h3>Fonction objectif (coefficients)</h3>
<p>Exemple : <code>3 5</code> pour Z = 3x₁ + 5x₂</p>
<input id="objective" value="3 5">

<h3>Matrice des contraintes A</h3>
<p>Une ligne par contrainte</p>
<textarea id="matrixA">1 2
3 1</textarea>

<h3>Vecteur b</h3>
<p>Second membre</p>
<textarea id="vectorB">8
9</textarea>

<button onclick="resoudre()">Résoudre</button>

<h3>Résultat</h3>
<pre id="resultat"></pre>

<script>
function lireVecteur(txt) {
  return txt.trim().split(/\s+/).map(Number);
}

function lireMatrice(txt) {
  return txt.trim().split("\n").map(l =>
    l.trim().split(/\s+/).map(Number)
  );
}

function simplex(c, A, b) {
  const m = A.length;
  const n = c.length;
  let tableau = [];

  // Contraintes + variables d'écart
  for (let i = 0; i < m; i++) {
    tableau[i] = [...A[i]];
    for (let j = 0; j < m; j++)
      tableau[i].push(i === j ? 1 : 0);
    tableau[i].push(b[i]);
  }

  // Fonction objectif
  let Z = c.map(v => -v);
  for (let i = 0; i < m + 1; i++) Z.push(0);
  tableau.push(Z);

  // Itérations
  while (true) {
    let last = tableau[m];
    let pivotCol = last.slice(0, -1).findIndex(v => v < 0);
    if (pivotCol === -1) break;

    let ratios = tableau.slice(0, m)
      .map(row => row[pivotCol] > 0
        ? row[row.length - 1] / row[pivotCol]
        : Infinity);

    let pivotRow = ratios.indexOf(Math.min(...ratios));
    let pivot = tableau[pivotRow][pivotCol];

    tableau[pivotRow] = tableau[pivotRow].map(v => v / pivot);

    for (let i = 0; i <= m; i++) {
      if (i !== pivotRow) {
        let f = tableau[i][pivotCol];
        tableau[i] = tableau[i].map(
          (v, j) => v - f * tableau[pivotRow][j]
        );
      }
    }
  }

  // Lecture solution
  let sol = Array(n).fill(0);
  for (let j = 0; j < n; j++) {
    let col = tableau.map(r => r[j]);
    if (col.filter(v => v === 1).length === 1) {
      let i = col.indexOf(1);
      sol[j] = tableau[i][tableau[i].length - 1];
    }
  }

  const valeurZ = tableau[m][tableau[0].length - 1];
  return { sol, valeurZ };
}

function resoudre() {
  const result = document.getElementById("resultat");
  try {
    const c = lireVecteur(document.getElementById("objective").value);
    const A = lireMatrice(document.getElementById("matrixA").value);
    const b = lireVecteur(document.getElementById("vectorB").value);

    if (A.length !== b.length)
      throw "Nombre de contraintes incohérent.";

    const r = simplex(c, A, b);

    let txt = "Solution optimale :\n";
    r.sol.forEach((v, i) =>
      txt += `x${i + 1} = ${v.toFixed(3)}\n`
    );
    txt += `\nValeur optimale Z = ${r.valeurZ.toFixed(3)}`;

    result.className = "";
    result.textContent = txt;
  } catch (e) {
    result.className = "error";
    result.textContent = "Erreur : " + e;
  }
}
</script>

</body>
</html>
