<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Graphique Sage</title>

    <!-- Inclusion SageCell -->
    <script src="https://sagecell.sagemath.org/static/embedded_sagecell.js"></script>
    <script>
        sagecell.makeSagecell({
            inputLocation: ".sage",
            autoeval: true
        });
    </script>
</head>

<body>

<h3>Graphique d’une fonction</h3>

<div class="sage">
<script type="text/x-sage">
@interact
def _(a = slider(-3, 3, 0.1, default=1)):
    f(x) = a*x^2 - 2
    p = plot(f, (x, -3, 3), ymin=-5, ymax=5)
    show(p)
</script>
</div>

</body>
</html>
